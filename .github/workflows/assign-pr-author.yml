name: Assign PR author

on:
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  assign:
    # Bots (e.g. dependabot) cannot be assignees; only assign human authors
    if: ${{ github.event.pull_request.user.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      # gh pr edit --add-assignee needs write access to the pull request
      pull-requests: write
    steps:
      - name: Assign PR author as assignee
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO" --add-assignee "$PR_AUTHOR"
